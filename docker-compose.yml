services:
  app:
    build: ./django_app
    command: uvicorn chatproject.asgi:application --host 0.0.0.0 --port 8000 --workers 2 --timeout-keep-alive 120
    ports:
      - "8000:8000"
    volumes:
      - sqlite-data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - path: .env
        required: false
    environment:
      - DATABASE_PATH=/app/data/db.sqlite3
      - RUN_MIGRATIONS=true
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - MCP_SERVER_URL=http://mcp-server:8001/sse
    depends_on:
      - mcp-server

  mcp-server:
    build: ./mcp_server
    ports:
      - "8001:8001"
    env_file:
      - path: .env
        required: false
    environment:
      - DJANGO_API_BASE_URL=http://app:8000
      - MCP_HOST=0.0.0.0
      - MCP_PORT=8001

volumes:
  sqlite-data:
