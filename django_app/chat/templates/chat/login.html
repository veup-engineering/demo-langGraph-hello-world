{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Sign in</title>
  <style>
    body { font-family: system-ui, sans-serif; background: #0f172a; color: #e2e8f0;
           display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
    .card { background: #1e293b; padding: 2rem 2.5rem; border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,.3); width: 320px; }
    h1 { margin: 0 0 1rem; font-size: 1.4rem; }
    label { display: block; margin: .8rem 0 .2rem; font-size: .85rem; color: #94a3b8; }
    input { width: 100%; box-sizing: border-box; padding: .55rem .7rem; border-radius: 6px;
            border: 1px solid #334155; background: #0f172a; color: #e2e8f0; font-size: 1rem; }
    button { width: 100%; margin-top: 1.2rem; padding: .65rem; border-radius: 6px; border: 0;
             background: #6366f1; color: white; font-weight: 600; cursor: pointer; font-size: 1rem; }
    button:hover { background: #4f46e5; }
    .error { color: #fca5a5; font-size: .85rem; margin-top: .5rem; }
  </style>
</head>
<body>
  <form class="card" method="post">
    {% csrf_token %}
    <h1>Sign in</h1>
    {% if form.errors %}<div class="error">Invalid username or password.</div>{% endif %}
    <label for="id_username">Username</label>
    {{ form.username }}
    <label for="id_password">Password</label>
    {{ form.password }}
    <button type="submit">Sign in</button>
  </form>
</body>
</html>
